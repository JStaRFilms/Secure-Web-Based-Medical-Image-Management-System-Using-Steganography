<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigSam Steganography - Access Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        clinical: { bg: '#f8fafc', surface: '#ffffff', primary: '#2563eb', accent: '#0ea5e9' },
                        cyber: { bg: '#09090b', surface: '#18181b', primary: '#06b6d4', accent: '#6366f1' }
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body
    class="bg-slate-50 text-slate-900 dark:bg-zinc-950 dark:text-zinc-100 font-sans h-screen flex items-center justify-center relative overflow-hidden transition-colors duration-300">

    <!-- Theme Toggle -->
    <div class="fixed top-6 right-6 z-50">
        <button onclick="toggleTheme()"
            class="bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 p-2 rounded-full shadow-lg hover:scale-105 transition-transform">
            <i data-lucide="sun" class="w-5 h-5 dark:hidden text-orange-500"></i>
            <i data-lucide="moon" class="w-5 h-5 hidden dark:block text-cyan-400"></i>
        </button>
    </div>

    <!-- Background Elements -->
    <div
        class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:40px_40px]">
    </div>
    <div
        class="absolute top-0 w-full h-1/2 bg-gradient-to-b from-blue-50/50 to-transparent dark:from-cyan-900/10 dark:to-transparent pointer-events-none">
    </div>

    <!-- Auth Card -->
    <div
        class="w-full max-w-md bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-slate-200 dark:border-zinc-800 p-8 relative z-10 mx-4">

        <div class="text-center mb-8">
            <div
                class="w-16 h-16 bg-blue-600 dark:bg-cyan-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20 dark:shadow-cyan-500/20">
                <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">System Access</h1>
            <p class="text-slate-500 dark:text-zinc-400 text-sm mt-2">Enter credentials to decrypt interface.</p>
        </div>

        <form class="space-y-4" action="dashboard.html">
            <div>
                <label
                    class="block text-xs font-mono font-medium text-slate-500 dark:text-zinc-400 mb-1 uppercase tracking-wider">Medical
                    ID / Email</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-3 top-3 w-5 h-5 text-slate-400"></i>
                    <input type="email"
                        class="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-lg py-3 pl-10 pr-4 outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-cyan-500 transition-all font-mono text-sm"
                        placeholder="dr.sam@hospital.org">
                </div>
            </div>

            <div>
                <label
                    class="block text-xs font-mono font-medium text-slate-500 dark:text-zinc-400 mb-1 uppercase tracking-wider">Security
                    Token</label>
                <div class="relative">
                    <i data-lucide="key" class="absolute left-3 top-3 w-5 h-5 text-slate-400"></i>
                    <input type="password"
                        class="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-lg py-3 pl-10 pr-4 outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-cyan-500 transition-all font-mono text-sm"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white dark:bg-cyan-600 dark:hover:bg-cyan-700 py-3 rounded-lg font-semibold shadow-lg shadow-blue-500/20 dark:shadow-cyan-500/20 transition-all active:scale-95 flex items-center justify-center gap-2 mt-6">
                <i data-lucide="fingerprint" class="w-5 h-5"></i> Authenticate
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-zinc-800 text-center">
            <p class="text-xs text-slate-400 dark:text-zinc-500">Secured by 256-bit Architecture</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
</body>

</html>
